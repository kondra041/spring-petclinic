name: Run LLM Generated Tests

on:
  push:
    paths:
      - 'src/test/**'
  pull_request:
    paths:
      - 'src/test/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run tests
        run: mvn test
